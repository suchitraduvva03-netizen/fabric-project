<!DOCTYPE html>
<html>
<head>
    <title>Fabric Detection</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f2f2f2;
        }
        h2 {
            color: #333;
        }
        form {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input[type="submit"] {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>Fabric Detection App</h2>

<form action="/predict" method="post" enctype="multipart/form-data">
    <input type="file" name="image"><br><br>
    <input type="submit" value="Predict">
</form>

{% if prediction %}
<h3>Result</h3>
<p>Fabric: {{ prediction }}</p>
<p>Confidence: {{ confidence }}%</p>
{% endif %}

</body>
</html>
